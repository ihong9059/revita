<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>REVITA Tower Host Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #0f0; margin-bottom: 10px; font-size: 1.4em; }
        .status { padding: 8px 12px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9em; }
        .connected { background: #143d14; border: 1px solid #0f0; }
        .disconnected { background: #3d1414; border: 1px solid #f00; }

        .section { background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .section h2 { color: #7ec8e3; font-size: 1.1em; margin-bottom: 10px; }

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        button {
            padding: 12px 8px; border: 1px solid #555; border-radius: 4px;
            background: #0e4166; color: #fff; cursor: pointer; font-family: monospace;
            font-size: 0.95em; transition: background 0.15s;
        }
        button:hover { background: #1a6b9e; }
        button:active { background: #0f0; color: #000; }
        button.on { background: #2d6b2d; border-color: #0f0; }
        button.off { background: #6b2d2d; border-color: #f00; }
        button.info { background: #4a3d6b; border-color: #a0f; }

        .custom-send { display: flex; gap: 8px; margin-top: 10px; }
        .custom-send input {
            flex: 1; padding: 10px; background: #0d1b2a; color: #0f0;
            border: 1px solid #555; border-radius: 4px; font-family: monospace;
        }

        .log-box {
            background: #0d1b2a; border: 1px solid #333; border-radius: 4px;
            height: 300px; overflow-y: auto; padding: 8px; font-size: 0.85em;
        }
        .log-tx { color: #ff6; }
        .log-rx { color: #0f0; }
        .log-time { color: #888; }

        .conn-row { display: flex; gap: 8px; align-items: center; }
        .conn-row input {
            flex: 1; padding: 8px; background: #0d1b2a; color: #eee;
            border: 1px solid #555; border-radius: 4px; font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>REVITA Tower Host Test</h1>

    <div id="status" class="status disconnected">Disconnected</div>

    <div class="section">
        <h2>Connection</h2>
        <div class="conn-row">
            <input type="text" id="port" value="{{ port }}" placeholder="/dev/ttyACMx">
            <button onclick="doConnect()">Connect</button>
        </div>
    </div>

    <div class="section">
        <h2>Commands</h2>
        <div class="btn-grid">
            <button class="on" onclick="sendCmd('CMD:LED_ON')">LED ON</button>
            <button class="off" onclick="sendCmd('CMD:LED_OFF')">LED OFF</button>
            <button class="info" onclick="sendCmd('CMD:STATUS')">STATUS</button>
            <button class="on" onclick="sendCmd('CMD:BUZZER_ON')">BUZZER ON</button>
            <button class="off" onclick="sendCmd('CMD:BUZZER_OFF')">BUZZER OFF</button>
            <button class="info" onclick="sendCmd('CMD:SENSOR_READ')">SENSOR READ</button>
        </div>
        <div class="custom-send">
            <input type="text" id="customCmd" placeholder="DATA:hello world" onkeydown="if(event.key==='Enter')sendCustom()">
            <button onclick="sendCustom()">Send</button>
        </div>
    </div>

    <div class="section">
        <h2>Communication Log</h2>
        <div class="log-box" id="logBox"></div>
        <button style="margin-top:8px; background:#333;" onclick="clearLog()">Clear Log</button>
    </div>

<script>
    let logData = [];

    async function doConnect() {
        const port = document.getElementById('port').value;
        const r = await fetch('/api/connect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({port})
        });
        const j = await r.json();
        updateStatus(j.ok);
    }

    async function sendCmd(cmd) {
        const r = await fetch('/api/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cmd})
        });
        const j = await r.json();
        if (!j.ok) alert(j.error || 'send failed');
        refreshLog();
    }

    function sendCustom() {
        const input = document.getElementById('customCmd');
        const cmd = input.value.trim();
        if (cmd) {
            sendCmd(cmd);
            input.value = '';
        }
    }

    function updateStatus(connected) {
        const el = document.getElementById('status');
        const port = document.getElementById('port').value;
        if (connected) {
            el.className = 'status connected';
            el.textContent = 'Connected: ' + port;
        } else {
            el.className = 'status disconnected';
            el.textContent = 'Disconnected';
        }
    }

    async function refreshLog() {
        const r = await fetch('/api/log');
        logData = await r.json();
        renderLog();
    }

    function renderLog() {
        const box = document.getElementById('logBox');
        let html = '';
        for (const e of logData) {
            const cls = e.dir === 'TX' ? 'log-tx' : 'log-rx';
            html += `<div><span class="log-time">${e.time}</span> <span class="${cls}">[${e.dir}]</span> ${e.text}</div>`;
        }
        box.innerHTML = html;
        box.scrollTop = box.scrollHeight;
    }

    function clearLog() {
        logData = [];
        document.getElementById('logBox').innerHTML = '';
    }

    // Auto-refresh
    async function checkStatus() {
        try {
            const r = await fetch('/api/status');
            const j = await r.json();
            updateStatus(j.connected);
        } catch(e) {}
    }

    setInterval(() => { refreshLog(); checkStatus(); }, 2000);
    checkStatus();
    refreshLog();
</script>
</body>
</html>
