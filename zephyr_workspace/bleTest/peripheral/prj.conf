# General
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="REVITA_RX"
CONFIG_BT_DEVICE_APPEARANCE=0

# GATT
CONFIG_BT_GATT_CLIENT=n

# Connection parameters
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# Security (disabled for simple test)
CONFIG_BT_SMP=n

# TX Power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Console/UART
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Custom service UUID
CONFIG_BT_GATT_DYNAMIC_DB=y

# HCI for RSSI reading
CONFIG_BT_HCI=y
